; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
extra_scripts = pre:scripts/load_env.py
check_tool = cppcheck
check_skip_packages = yes
check_flags =
  cppcheck: --enable=warning,style,performance,portability
  cppcheck: --inline-suppr
  cppcheck: --suppress=unusedFunction
  cppcheck: --suppress=missingIncludeSystem
  cppcheck: --suppress=noExplicitConstructor:*/.pio/libdeps/*/OneWire/OneWire.h
  cppcheck: --suppress=noExplicitConstructor:*/.pio/libdeps/*/DallasTemperature/DallasTemperature.h

lib_deps =
  https://github.com/DFRobot/GravityTDS.git
  paulstoffregen/OneWire
  milesburton/DallasTemperature
  marcoschwartz/LiquidCrystal_I2C@^1.1.4
